name: docker-mcp-smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Pull embedding model
        run: docker exec mcp_rag_ollama ollama pull nomic-embed-text

      - name: Run Docker scoped RAG smoke
        run: bash scripts/run_rag_eval_in_docker.sh cerebro_mcp

      - name: Run MCP HTTP smoke
        run: python scripts/mcp_http_smoke.py --url http://localhost:8001/mcp
