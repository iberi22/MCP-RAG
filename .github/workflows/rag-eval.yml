name: rag-eval

on:
  workflow_dispatch:
  pull_request:

jobs:
  eval-local:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run local RAG evaluation levels
        run: python scripts/rag_eval_levels.py --levels all

