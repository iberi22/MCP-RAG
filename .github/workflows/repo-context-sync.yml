name: Repo Context Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write

concurrency:
  group: repo-context-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync repositories into RAG
        run: |
          python -m cerebro_python rag-sync-repos \
            --config scripts/skills/repo_context_sync/repos.config.json \
            --state .gitcore/repo_context_state.json \
            --cache-dir .cache/repo-context-repos

      - name: Commit updated RAG artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cerebro_rag.db .gitcore/repo_context_state.json
          if git diff --cached --quiet; then
            echo "No RAG context changes to commit."
            exit 0
          fi
          git commit -m "chore(rag): sync GitHub repo contexts [skip ci]"
          git push
